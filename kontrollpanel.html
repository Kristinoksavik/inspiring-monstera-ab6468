<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fotomaleri · Kontrollpanel</title>
<style>
  :root{--gull:#c4944a;--gull-mork:#a87d38;--blekk:#1a1a1a;--beige:#f5f5f3;--beige-mork:#eceae4;--linje:#ddd9d0;--skygge:0 1px 3px rgba(26,26,26,.08),0 4px 16px rgba(26,26,26,.06)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:var(--beige);color:var(--blekk);line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}
  .topp{padding:26px 22px 6px;max-width:900px;margin:0 auto;display:flex;align-items:center;gap:12px}
  .merke-ikon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--gull),var(--gull-mork));color:#fff;font-weight:600;font-size:20px;display:grid;place-items:center;box-shadow:var(--skygge)}
  .topp h1{font-size:19px;font-weight:600;letter-spacing:-.01em}
  .topp .under{font-size:12px;color:#8a857b}
  .wrap{max-width:900px;margin:0 auto;padding:20px 22px 60px}
  .grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(250px,1fr))}
  .kort{display:flex;flex-direction:column;background:#fff;border:1px solid var(--linje);border-radius:14px;padding:22px;text-decoration:none;color:inherit;box-shadow:var(--skygge);transition:.15s}
  .kort:hover{transform:translateY(-3px);box-shadow:0 6px 22px rgba(26,26,26,.12);border-color:var(--gull)}
  .kort.snart{opacity:.55;cursor:default;pointer-events:none}
  .kort .ikon{font-size:30px;margin-bottom:12px}
  .kort .navn{font-size:17px;font-weight:600;margin-bottom:6px}
  .kort .besk{font-size:13.5px;color:#6b665d;flex:1}
  .kort .peil{margin-top:14px;font-size:13px;font-weight:600;color:var(--gull-mork)}
  .kort .merkelapp{align-self:flex-start;margin-top:12px;font-size:11px;font-weight:600;background:var(--beige-mork);color:#8a857b;padding:3px 9px;border-radius:20px}
  /* lås */
  #laas{position:fixed;inset:0;z-index:9999;background:var(--blekk);display:flex;align-items:center;justify-content:center}
  #laas .boks{text-align:center;color:var(--beige);max-width:320px;width:100%;padding:24px}
  #laas input{width:100%;padding:12px 14px;border:none;border-radius:9px;font-size:16px;margin-bottom:10px}
  #laas button{background:var(--gull);color:#fff;border:none;padding:12px 20px;border-radius:9px;font-weight:600;width:100%;cursor:pointer;font-size:15px}
  #laasFeil{color:#e08a8a;font-size:13px;margin-top:10px;display:none}
</style>
</head>
<body>

<div id="laas">
  <div class="boks">
    <div style="font-size:34px;margin-bottom:10px">🔒</div>
    <div style="font-weight:600;font-size:18px;margin-bottom:16px">Kontrollpanel</div>
    <input id="laasInput" type="password" placeholder="Passord">
    <button id="laasBtn">Lås opp</button>
    <div id="laasFeil">Feil passord</div>
  </div>
</div>

<div class="topp">
  <div class="merke-ikon">K</div>
  <div>
    <h1>Kontrollpanel</h1>
    <div class="under">Fotomaleri · dine admin-verktøy</div>
  </div>
</div>

<div class="wrap">
  <div class="grid" id="grid"></div>
</div>

<script>
  // === PASSORD (samme som bestillingspanelet). Byttes her: ===
  var PASSORD = 'fotomaleri2026';
  (function(){
    var laas=document.getElementById('laas');
    if(localStorage.getItem('panel-aapen')==='1'){ laas.style.display='none'; }
    function sjekk(){
      if(document.getElementById('laasInput').value===PASSORD){
        localStorage.setItem('panel-aapen','1'); laas.style.display='none';
      } else { document.getElementById('laasFeil').style.display='block'; }
    }
    document.getElementById('laasBtn').addEventListener('click',sjekk);
    document.getElementById('laasInput').addEventListener('keydown',function(e){ if(e.key==='Enter') sjekk(); });
  })();

  // === KORT: legg til flere ved å kopiere en linje. klar:false = «kommer snart». ===
  var PANELER = [
    {ikon:'🎨', navn:'Bestillinger — Fotomaleri', besk:'Nye bestillinger fra annonse-trakten. Svar, lever fil og følg opp.', href:'bestillingspanel.html', klar:true},
    {ikon:'🏅', navn:'Konkurranse', besk:'Tilbakemelding på innsendinger fra appene (sommerkonkurransen).', href:'admin.html', klar:true},
    {ikon:'✉️', navn:'Viktig e-post', besk:'Samle og følge opp viktige henvendelser. Kommer snart.', href:'#', klar:false},
    {ikon:'➕', navn:'Flere verktøy', besk:'Plass til det du trenger etter hvert.', href:'#', klar:false}
  ];
  var grid=document.getElementById('grid');
  PANELER.forEach(function(p){
    var el=document.createElement(p.klar?'a':'div');
    el.className='kort'+(p.klar?'':' snart');
    if(p.klar) el.href=p.href;
    el.innerHTML='<div class="ikon">'+p.ikon+'</div>'+
      '<div class="navn">'+p.navn+'</div>'+
      '<div class="besk">'+p.besk+'</div>'+
      (p.klar?'<div class="peil">Åpne →</div>':'<div class="merkelapp">Kommer snart</div>');
    grid.appendChild(el);
  });
</script>
</body>
</html>
